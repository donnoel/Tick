name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      RESULT_BUNDLE: ${{ github.workspace }}/TestResults/Tick.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Tick.xcodeproj

      - name: Show environment
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devicetypes
          xcodebuild -project Tick.xcodeproj -scheme Tick -showdestinations

      - name: Prepare simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(python3 <<'PY'
          import json
          import subprocess

          runtimes = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "--json"])
          )["runtimes"]
          ios_runtimes = [
              runtime for runtime in runtimes
              if runtime.get("platform") == "iOS" and runtime.get("isAvailable")
          ]
          if not ios_runtimes:
              raise SystemExit("No available iOS simulator runtimes.")

          def version_key(runtime):
              parts = []
              for part in runtime.get("version", "0").split("."):
                  try:
                      parts.append(int(part))
                  except ValueError:
                      break
              return tuple(parts)

          runtime_identifier = sorted(ios_runtimes, key=version_key)[-1]["identifier"]

          device_types = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "--json"])
          )["devicetypes"]
          iphone_types = [
              device_type for device_type in device_types
              if device_type.get("name", "").startswith("iPhone")
          ]
          if not iphone_types:
              raise SystemExit("No iPhone simulator device types.")

          preferred_names = [
              "iPhone 17 Pro",
              "iPhone 17",
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone SE (3rd generation)",
          ]
          selected_device = next(
              (
                  device_type for preferred_name in preferred_names
                  for device_type in iphone_types
                  if device_type.get("name") == preferred_name
              ),
              iphone_types[-1],
          )

          simulator_id = subprocess.check_output(
              [
                  "xcrun",
                  "simctl",
                  "create",
                  "CI iPhone",
                  selected_device["identifier"],
                  runtime_identifier,
              ],
              text=True,
          ).strip()
          print(simulator_id)
          PY
          )"
          echo "id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "${SIMULATOR_ID}" || true
          xcrun simctl bootstatus "${SIMULATOR_ID}" -b

      - name: Build and test
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$RESULT_BUNDLE")"
          rm -rf "$RESULT_BUNDLE"
          xcodebuild \
            -project Tick.xcodeproj \
            -scheme Tick \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}' \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            clean test

      - name: Upload xcodebuild artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-artifacts
          path: |
            ${{ env.RESULT_BUNDLE }}
            ${{ env.DERIVED_DATA }}/Logs/Test
